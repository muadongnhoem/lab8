<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(120deg, #fff8e1, #ffffff);
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #fbc02d, #ffeb3b);
            color: #333;
            padding: 30px 0;
            text-align: center;
        }

        nav a {
            color: #333;
            margin: 0 15px;
            text-decoration: none;
            font-weight: 600;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 40px 0;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 {
            margin-bottom: 15px;
            color: #444;
        }

        /* Avatar */
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 15px;
            border: 5px solid #fbc02d;
        }

        /* Projects */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .project {
            background: #fffde7;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .project img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .project-content {
            padding: 15px;
        }

        /* Contact */
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            background: linear-gradient(135deg, #fbc02d, #ffeb3b);
            color: #333;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            opacity: 0.9;
        }

    </style>
</head>
<body>

<header>
    <h1>My Portfolio</h1>
    <nav>
        <a href="#about">Giới thiệu</a>
        <a href="#projects">Dự án</a>
        <a href="#contact">Liên hệ</a>
    </nav>
</header>

<div class="container">

    <section id="about" class="card">
        <img class="avatar" src="https://preview.redd.it/finn-is-so-off-model-in-the-eyes-lol-v0-hzst9m8ko0wb1.png?auto=webp&s=c9e412e63b93795089ff1109e96c4390d09f6075" alt="avatar">
        <h2 style="text-align: center;"> Giới thiệu </h2>
        <p style="text-align: center;">Xin chào! Tôi là Nguyễn Bảo Lâm, sinh viên trường đại học Văn Lang!</p>
    </section>

    <section id="projects" class="card">
        <h2 style="text-align: center;">Dự án</h2>
        <div class="projects-grid">

            <div class="project">
                <img src="https://khpt.1cdn.vn/2025/11/20/vlu-5.jpg" alt="project">
                <div class="project-content">
                    <h3 style="text-align: center;">Dự án 1</h3>
                </div>
            </div>

            <div class="project">
                <img src="https://congdankhuyenhoc.qltns.mediacdn.vn/449484899827462144/2025/3/14/dhvl-17419151224471700879278.jpg" alt="project">
                <div class="project-content">
                    <h3 style="text-align: center;">Dự án 2</h3>
                </div>
            </div>

            <div class="project">
                <img src="https://vluwebmedia.s3.ap-southeast-1.amazonaws.com/a1_f9da3b750f.jpg" alt="project">
                <div class="project-content">
                    <h3 style="text-align: center;">Dự án 3</h3>
                </div>
            </div>

        </div>
</div>
</body>
</html>
